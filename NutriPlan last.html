    ],
    forbidden:'بيبسي\nالمأكولات السريعة\nالحلويات بانواعه\nالشوكولاته\nالزيوت المصنعة\nالسكريات المضافة\nالمشروبات الغازية\nالأطعمة المقلية بالزيوت',
    reduce:'الحد من تناول الاملاح',
    focus:'شرب 4 لتر من الماء يومياً\nجميع الوجبات يكون بها طبق سلطة خضار\n3 كوب مغلي البقدونس قبل كل وجبه بنصف ساعه',
    vitamins:'فيتامين سي قرص واحد بعد الفطار\nاوميجا 3 قرص واحد بعد الغدا\nمغنسيوم قرص واحد قبل النوم\nزنك قرص واحد قبل النوم\nكروميوم 200 ميكروجرام قبل الفطار بنص ساعه',
    supps:'ال كارنتين'
  }
};

const e=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const L=s=>(s||'').split('\n').filter(Boolean);
const n=v=>parseFloat(v)||0;
function tot(){let c=0,p=0,k=0,f=0;S.np.meals.forEach(m=>{c+=n(m.cal);p+=n(m.pro);k+=n(m.carb);f+=n(m.fat)});return{cal:c,pro:p,carb:k,fat:f}}
function handlePhoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{coachPhoto=ev.target.result;R()};r.readAsDataURL(f);}
function TT(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

function R(){
  document.getElementById('app').innerHTML=`
  <div class="hdr"><div class="hdr-l"><div class="ic">🍽️</div><div><h1>Nutri<b>Plan</b></h1><div class="sub">Dashboard</div></div></div>
  <div class="hdr-a"><button class="bt bt-r" onclick="if(confirm('مسح البيانات؟')){S.cl={name:'',age:'',height:'',weight:'',goal:'تخسيس',sd:'',ed:''};R()}">🔄</button>
  <button class="bt bt-g ${S.gen?'ld':''}" onclick="GEN()">${S.gen?'<span class="sp"></span> جاري...':'📄 PDF'}</button></div></div>
  <div class="tbar"><div class="tbar-in">
  ${[['client','👤','العميل'],['meals','🍽️','الوجبات'],['rules','📋','التعليمات'],['vitamins','💊','المكملات'],['coach','🏋️','الكابتن'],['intro','📖','المقدمة'],['faq','❓','أسئلة']].map(([id,ic,lb])=>`<button class="tb ${S.tab===id?'a':''}" onclick="S.tab='${id}';R()"><span class="ti">${ic}</span>${lb}</button>`).join('')}
  </div></div>
  <div class="ca"><div class="cc"><div class="tc">${TAB()}</div></div></div>
  <div class="toast" id="toast"></div>`;
}

function TAB(){
  const c=S.cl,np=S.np,o=S.co;
  if(S.tab==='client') return `<div class="st"><span class="si">👤</span><h2>بيانات العميل</h2></div>
    <div class="g2"><div class="cs2 fd"><label>الاسم</label><input value="${e(c.name)}" oninput="S.cl.name=this.value" placeholder="اسم العميل"></div>
    <div class="fd"><label>العمر</label><input type="number" value="${e(c.age)}" oninput="S.cl.age=this.value"></div>
    <div class="fd"><label>الطول (سم)</label><input type="number" value="${e(c.height)}" oninput="S.cl.height=this.value"></div>
    <div class="fd"><label>الوزن (كجم)</label><input type="number" value="${e(c.weight)}" oninput="S.cl.weight=this.value"></div>
    <div class="fd"><label>الهدف</label><select onchange="S.cl.goal=this.value">${['تخسيس','تضخيم','تنشيف','ثبات','Body Recomposition'].map(g=>`<option ${c.goal===g?'selected':''}>${g}</option>`).join('')}</select></div>
    <div class="fd"><label>تاريخ البداية</label><input type="date" value="${e(c.sd)}" oninput="S.cl.sd=this.value"></div>
    <div class="fd"><label>تاريخ الانتهاء</label><input type="date" value="${e(c.ed)}" oninput="S.cl.ed=this.value"></div></div>`;

  if(S.tab==='meals'){const t=tot();return `<div class="st"><span class="si">🍽️</span><h2>الوجبات</h2></div>
    ${np.meals.map((m,i)=>`<div class="mc"><span class="mc-n">${i+1}</span><button class="mc-rm" onclick="S.np.meals.splice(${i},1);R()">✕</button>
    <div style="padding-top:6px"><div class="fd"><label>اسم الوجبة</label><input value="${e(m.name)}" oninput="S.np.meals[${i}].name=this.value"></div>
    <div class="fd"><label>المحتوى</label><textarea rows="3" oninput="S.np.meals[${i}].items=this.value">${e(m.items)}</textarea></div>
    <div class="fd"><label>البديل</label><textarea rows="2" oninput="S.np.meals[${i}].alt=this.value">${e(m.alt)}</textarea></div>
    <div class="g4"><div class="fd"><label>🔥كالوري</label><input type="number" value="${e(m.cal)}" oninput="S.np.meals[${i}].cal=this.value"></div>
    <div class="fd"><label>🥩بروتين</label><input type="number" value="${e(m.pro)}" oninput="S.np.meals[${i}].pro=this.value"></div>
    <div class="fd"><label>🍞كاربز</label><input type="number" value="${e(m.carb)}" oninput="S.np.meals[${i}].carb=this.value"></div>
    <div class="fd"><label>🫒دهون</label><input type="number" value="${e(m.fat)}" oninput="S.np.meals[${i}].fat=this.value"></div></div>
    ${(n(m.cal)||n(m.pro))?`<div class="macro-row"><div class="mp mp-c"><span class="mv">${n(m.cal)}</span>Cal</div><div class="mp mp-p"><span class="mv">${n(m.pro)}g</span>Pro</div><div class="mp mp-k"><span class="mv">${n(m.carb)}g</span>Carb</div><div class="mp mp-f"><span class="mv">${n(m.fat)}g</span>Fat</div></div>`:''}
    </div></div>`).join('')}
    <button class="ba" onclick="S.np.meals.push({name:'',items:'',alt:'',cal:'',pro:'',carb:'',fat:''});R()">+ إضافة وجبة</button>
    ${(t.cal)?`<div class="dt"><div class="di di-c"><span class="dv">${t.cal}</span>كالوري</div><div class="di di-p"><span class="dv">${t.pro}g</span>بروتين</div><div class="di di-k"><span class="dv">${t.carb}g</span>كاربز</div><div class="di di-f"><span class="dv">${t.fat}g</span>دهون</div></div>`:''}`;}

  if(S.tab==='rules') return `<div class="st"><span class="si">📋</span><h2>التعليمات</h2></div>
    <div class="rs rs-f"><div class="fd"><label>🚫 الممنوع</label><textarea rows="5" oninput="S.np.forbidden=this.value">${e(np.forbidden)}</textarea></div></div>
    <div class="rs rs-d"><div class="fd"><label>⚠️ التقليل</label><textarea rows="2" oninput="S.np.reduce=this.value">${e(np.reduce)}</textarea></div></div>
    <div class="rs rs-o"><div class="fd"><label>✅ الاهتمام</label><textarea rows="3" oninput="S.np.focus=this.value">${e(np.focus)}</textarea></div></div>`;

  if(S.tab==='vitamins') return `<div class="st"><span class="si">💊</span><h2>الفيتامينات والمكملات</h2></div>
    <div class="fd"><label>الفيتامينات</label><textarea rows="6" oninput="S.np.vitamins=this.value">${e(np.vitamins)}</textarea></div>
    <div class="fd"><label>المكملات</label><textarea rows="3" oninput="S.np.supps=this.value">${e(np.supps)}</textarea></div>`;

  if(S.tab==='coach') return `<div class="st"><span class="si">🏋️</span><h2>بيانات الكابتن</h2></div>
    <div class="phu"><div class="phc">${coachPhoto?`<img src="${coachPhoto}">`:'<span class="php">📷</span>'}<input type="file" accept="image/*" onchange="handlePhoto(this)"></div><span class="phl">اضغط لاختيار الصورة</span></div>
    <div class="fd"><label>الاسم</label><input value="${e(o.name)}" oninput="S.co.name=this.value"></div>
    <div class="fd"><label>الهاتف</label><input value="${e(o.phone)}" oninput="S.co.phone=this.value" dir="ltr" style="text-align:left"></div>
    <div class="fd"><label>واتساب</label><input value="${e(o.wa)}" oninput="S.co.wa=this.value" dir="ltr" style="text-align:left"></div>
    <div class="fd"><label>الوصف</label><input value="${e(o.cert)}" oninput="S.co.cert=this.value"></div>
    <div class="fd"><label>الشهادات والخبرات</label><textarea rows="5" oninput="S.co.certs=this.value">${e(o.certs)}</textarea></div>`;

  if(S.tab==='intro') return `<div class="st"><span class="si">📖</span><h2>المقدمة ومعلومات التغذية</h2></div>
    <div class="fd"><label>مقدمة عامة عن النظام</label><textarea rows="6" oninput="S.co.intro=this.value">${e(o.intro)}</textarea></div>
    <div class="fd"><label>معلومات عن التغذية</label><textarea rows="8" oninput="S.co.nutritionInfo=this.value">${e(o.nutritionInfo)}</textarea></div>`;

  if(S.tab==='faq') return `<div class="st"><span class="si">❓</span><h2>أسئلة شائعة عن الدايت</h2></div>
    <div class="fd"><label>الأسئلة والإجابات (افصل كل سؤال+إجابة بسطر ---)</label><textarea rows="14" oninput="S.co.faq=this.value">${e(o.faq)}</textarea></div>`;
}

function bg(){return '<div class="pp-bg"></div><div class="pp-pat"></div><div class="pp-bdr"></div>';}
function ft(o){return `<div class="pp-ft">${e(o.name)} | 📞 ${e(o.phone)} | 💬 ${e(o.wa)}</div>`;}

async function GEN(){
  S.gen=true;R();
  try{
    const c=S.cl,np=S.np,o=S.co,box=document.getElementById('pdf-render');
    const t=tot(),hm=t.cal>0;
    const ph=coachPhoto?`<img src="${coachPhoto}" style="width:100%;height:100%;object-fit:cover">`:'<span style="font-size:40px;color:rgba(201,168,76,0.2)">👤</span>';

    // Parse FAQ
    const faqItems=(o.faq||'').split('---').map(block=>{
      const lines=block.trim().split('\n').filter(Boolean);
      if(lines.length<2)return null;
      return{q:lines[0],a:lines.slice(1).join(' ')};
    }).filter(Boolean);

    box.innerHTML=`
    <!-- P1: COVER -->
    <div class="pp" id="p1">${bg()}<div class="pp-ct">
      <div class="pp-photo">${ph}</div>
      <div class="pp-badge">HEAD COACH</div>
      <div class="pp-cname">${e(o.name)}</div>
      <div class="pp-csub">${e(o.cert)}</div>

      <!-- Certificates on Cover -->
      <div style="width:85%;margin-top:16px;background:linear-gradient(145deg,rgba(201,168,76,0.08),rgba(201,168,76,0.02));border:1px solid rgba(201,168,76,0.25);border-radius:16px;padding:16px 20px;box-shadow:0 10px 30px rgba(0,0,0,0.2)">
        <div class="pp-ctitle" style="margin-bottom:10px;font-size:12px;text-shadow:none">الشهادات والخبرات</div>
        ${L(o.certs).map(c=>`<div class="cert-d" style="color:rgba(232,224,208,0.8);font-size:11px;line-height:1.7;margin-bottom:4px;font-weight:600">• ${e(c)}</div>`).join('')}
      </div>

      <div class="pp-ccard" style="margin-top:14px;padding:16px 30px;"><div class="pp-ctitle">بيانات المشترك</div><div class="pp-cgrid">
        <div class="pp-citem" style="padding:6px 0"><span class="pp-cil">الاسم</span><span class="pp-civ">${e(c.name)||'—'}</span></div>
        <div class="pp-citem" style="padding:6px 0"><span class="pp-cil">الهدف</span><span class="pp-civ">${e(c.goal)}</span></div>
        <div class="pp-citem" style="padding:6px 0"><span class="pp-cil">العمر</span><span class="pp-civ">${c.age?c.age+' سنة':'—'}</span></div>
        <div class="pp-citem" style="padding:6px 0"><span class="pp-cil">الطول</span><span class="pp-civ">${c.height?c.height+' سم':'—'}</span></div>
        <div class="pp-cwt" style="padding:6px 0"><div class="cwl">الوزن الحالي</div><div class="cwv">${c.weight||'—'} <span class="cwu">كجم</span></div></div>
      </div></div>
      ${hm?`<div class="pp-mbar" style="margin-top:14px">
        <div class="pp-mb mb-f"><span class="pv2">${t.fat}g</span><span class="pl2">Fat</span></div>
        <div class="pp-mb mb-k"><span class="pv2">${t.carb}g</span><span class="pl2">Carbs</span></div>
        <div class="pp-mb mb-p"><span class="pv2">${t.pro}g</span><span class="pl2">Protein</span></div>
        <div class="pp-mb mb-c"><span class="pv2">${t.cal}</span><span class="pl2">Calories</span></div>
      </div>`:''}
      ${ft(o)}
    </div></div>

    <!-- P2: INTRO + NUTRITION INFO -->
    <div class="pp" id="p2">${bg()}<div class="pp-ct">
      <div class="pp-ph"><h2>مقدمة عن النظام</h2><div class="phs">I N T R O D U C T I O N</div><div class="phl2"></div></div>
      <div class="pp-text">
        <h3>مقدمة عامة</h3>
        ${(o.intro||'').split('\n\n').map(p=>`<p>${e(p)}</p>`).join('')}
        <h3 style="margin-top:18px">معلومات عن التغذية</h3>
        ${(o.nutritionInfo||'').split('\n\n').map(p=>`<p>${e(p).replace(/• /g,'<br>• ')}</p>`).join('')}
      </div>
      ${ft(o)}
    </div></div>

    <!-- P3: MEALS -->
    <div class="pp" id="p3">${bg()}<div class="pp-ct">
      <div class="pp-ph"><h2>خطة الوجبات</h2><div class="phs">M E A L &nbsp; P L A N</div><div class="phl2"></div></div>
      ${np.meals.map((m,i)=>{const hmc=n(m.cal)||n(m.pro);return `
      <div class="pp-meal"><div class="mmb">${i+1}</div>
        <div class="mn">${e(m.name)||'وجبة '+(i+1)}</div>
        ${L(m.items).map(x=>`<div class="mi">• ${e(x)}</div>`).join('')}
        ${hmc?`<div class="mmc">
          <div class="mmp mb-c"><span class="mmv">${n(m.cal)}</span>Cal</div>
          <div class="mmp mb-p"><span class="mmv">${n(m.pro)}g</span>Pro</div>
          <div class="mmp mb-k"><span class="mmv">${n(m.carb)}g</span>Carb</div>
          <div class="mmp mb-f"><span class="mmv">${n(m.fat)}g</span>Fat</div>
        </div>`:''}
        ${L(m.alt).length?`<div class="mad">— البديل —</div>${L(m.alt).map(x=>`<div class="ma">• ${e(x)}</div>`).join('')}`:''}
      </div>`}).join('')}
      ${hm?`<div class="pp-mbar" style="margin-top:8px">
        <div class="pp-mb mb-f"><span class="pv2">${t.fat}g</span><span class="pl2">Fat</span></div>
        <div class="pp-mb mb-k"><span class="pv2">${t.carb}g</span><span class="pl2">Carbs</span></div>
        <div class="pp-mb mb-p"><span class="pv2">${t.pro}g</span><span class="pl2">Protein</span></div>
        <div class="pp-mb mb-c"><span class="pv2">${t.cal}</span><span class="pl2">Total</span></div>
      </div>`:''}
      ${ft(o)}
    </div></div>

    <!-- P4: GUIDELINES -->
    <div class="pp" id="p4">${bg()}<div class="pp-ct">
      <div class="pp-ph"><h2>التعليمات والمكملات</h2><div class="phs">G U I D E L I N E S</div><div class="phl2"></div></div>
      ${[['🚫 الممنوع',np.forbidden,'sf'],['⚠️ التقليل',np.reduce,'sd'],['✅ الاهتمام',np.focus,'so'],['💊 الفيتامينات',np.vitamins,'sv'],['💪 المكملات',np.supps,'ss']].map(([tt,ct,cls])=>L(ct).length?`<div class="pp-sec ${cls}"><div class="stt">${tt}</div>${L(ct).map(x=>`<div class="si2">• ${e(x)}</div>`).join('')}</div>`:``).join('')}
      ${ft(o)}
    </div></div>


    <!-- P6: FAQ -->
    <div class="pp" id="p6">${bg()}<div class="pp-ct">
      <div class="pp-ph"><h2>أسئلة شائعة عن الدايت</h2><div class="phs">F . A . Q</div><div class="phl2"></div></div>
      <div class="pp-text">
        ${faqItems.map(f=>`<div class="qa"><div class="qq">❓ ${e(f.q)}</div><div class="qa-a">${e(f.a)}</div></div>`).join('')}
      </div>
      ${ft(o)}
    </div></div>`;

    await document.fonts.ready;
    await new Promise(r=>setTimeout(r,700));

    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pages=['p1','p2','p3','p4','p6'];

    for(let i=0;i<pages.length;i++){
      const el=document.getElementById(pages[i]);
      if(!el)continue;
      const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#091c1c',logging:false,width:794,height:1123,windowWidth:794});
      const img=canvas.toDataURL('image/jpeg',0.93);
      if(i>0)pdf.addPage();
      pdf.addImage(img,'JPEG',0,0,210,297);
    }

    pdf.save('nutrition_plan_'+(c.name||'client').replace(/\s+/g,'_')+'.pdf');
    TT('✅ تم تحميل الـ PDF بنجاح!');
    box.innerHTML='';
  }catch(err){console.error(err);TT('❌ '+err.message);}
  S.gen=false;R();
}

R();
</script>
</body>
</html>
